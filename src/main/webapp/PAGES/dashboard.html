<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Dashboard - Sistema de Estoque</title>
        <link rel="stylesheet" href="../CSS/reset.css"/>
        <link rel="stylesheet" href="../CSS/color.css"/>
        <link rel="stylesheet" href="../CSS/dashboard.css"/>
    </head>
    <body>
        <header id="header">
            <div class="logo">
                <h1 id="tituloDashboard">Sistema de Estoque</h1>
            </div>
            <nav class="menu-navegacao">
                <ul>
                   <!-- <li><a href="#" class="ativo">Início</a></li> -->
                    <li><a href="#" onclick="verificarAcessoAdm(event)">Gerenciamento</a></li>
                    <li><a href="../index.html" class="btn-sair">Sair</a></li>
                </ul>
            </nav>
        </header>

        <main class="container">
            <section id="resumoEstoque" class="cards-container">
                <div class="card-resumo card-entrada">
                    <h2 class="titulo-card">Entrada</h2>
                    <p class="valor-card">100</p>
                </div>
                <div class="card-resumo card-saida">
                    <h2 class="titulo-card">Saída</h2>
                    <p class="valor-card">80</p>
                </div>
                <div class="card-resumo card-total">
                    <h2 class="titulo-card">Total</h2>
                    <p class="valor-card">20</p>
                </div>
            </section>

            <section id="filtro" class="filtro-container">
                <div class="grupo-filtro">
                    <label for="filtroData">Data</label>
                    <input type="date" id="filtroData" class="input-filtro">
                </div>
                <div class="grupo-filtro">
                    <label for="tipoMovimentacao">Tipo</label>
                    <select id="tipoMovimentacao" class="select-filtro">
                        <option value="">Selecione uma opção</option>
                        <option value="entrada">Entrada</option>
                        <option value="saida">Saída</option>
                    </select>
                </div>
                <div class="grupo-filtro pesquisa-nome">
                    <label for="pesquisarNome">Pesquisar item</label>
                    <input type="text" id="pesquisarNome" class="input-filtro" placeholder="Digite o nome do produto">
                </div>
                <div class="grupo-filtro botao-pesquisa">
                    <button id="btnPesquisar" class="btn-pesquisa">Pesquisar</button>
                </div>
            </section>

            <section id="tabelaEstoqueContainer" class="tabela-container">
                <table id="tabelaEstoque">
                    <thead>
                        <tr>
                            <th>Código de barras</th>
                            <th>Nome</th>
                            <th>Fabricante</th>
                            <th>Marca</th>
                            <th>Quantidade</th>
                            <th>Valor unitário</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabela">
                        <tr class="linha-item">
                            <td>123456789</td>
                            <td>Mouse</td>
                            <td>Logitech</td>
                            <td>MX</td>
                            <td>10</td>
                            <td>R$80,00</td>
                            <td>R$800,00</td>
                        </tr>
                        <tr class="linha-item">
                            <td>123456780</td>
                            <td>Teclado</td>
                            <td>Logitech</td>
                            <td>MXC</td>
                            <td>10</td>
                            <td>R$90,00</td>
                            <td>R$900,00</td>
                        </tr>
                    </tbody>
                </table>
            </section>

            <section id="paginacao" class="paginacao-container">
                <div class="controle-paginacao">
                    <label for="pagina">Página</label>
                    <select id="pagina" class="select-paginacao">
                        <option value="1">1</option>
                        <option value="2">2</option>
                    </select>
                </div>
                <div class="conteiner-btn">
                    <button id="btnVoltar" class="btn-acao">Voltar</button>
                    <button id="btnProximo" class="btn-acao btn-destaque">Próximo</button>
                </div>
            </section>
        </main>
        <script src="../JS/VerificarAcessoAdm_dashboard.js"></script>
    </body>
</html>
