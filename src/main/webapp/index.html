<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="CSS/reset.css"/>
        <link rel="stylesheet" href="CSS/color.css"/>
        <link rel="stylesheet" href="CSS/login.css"/>
        <title>Sistema de estoque</title>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    </head>

<body>
    <header>
        <div class="box-title">
        </div>
    </header>
    <main>
    <form action="/SistemaDeEstoque/login" method="post" class="container">
        <div class="logo-container">
            <img src="img/login.png" alt="Sistema de Estoque" onerror="this.style.display='none'">
        </div>

        <div class="User">
            <label>Usuário</label>
            <input type="text" name="users" class="inputUser" placeholder="Informe o Usuário" required />
        </div>

        <div class="Passsword">
            <label>Senha</label>
            <input type="password" name="psw" class="inputPassword" placeholder="Informe a senha" required />
        </div>
        
        <div class="links-auxiliares">    
            <div class="forgot-password">
                <a href="#">Esqueceu a senha?</a>
            </div>
        </div>

        <div class="box-button">
            <button type="submit" class="button">Entrar</button>
        </div>
        
        </form> 
</main>
